name: "Publish to gh-pages"

permissions:
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  publish:
    name: Publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
